services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: starvis
    ports:
      - "5433:5432"
    volumes:
      - starvis_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/starvis
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
    restart: always
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  starvis_pgdata:
